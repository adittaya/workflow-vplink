name: Test Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-installer:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run installer
        run: |
          bash install.sh

      - name: Verify installation
        run: |
          echo "=== Node ==="
          node -v

          echo "=== vplink3.0 command ==="
          which vplink3.0

          echo "=== Playwright module (from install dir) ==="
          cd "$HOME/vplink3.0"
          node -e "require('playwright'); console.log('playwright module OK')"

          echo "=== Xvfb ==="
          which Xvfb

          echo "=== x11vnc ==="
          which x11vnc

          echo "=== All checks passed ==="

      - name: Test Xvfb starts
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          xdpyinfo -display :99 2>&1 | head -3
          kill %1 2>/dev/null || true

      - name: Test automation syntax
        run: |
          node -c "$HOME/vplink3.0/automation.js"
          echo "Syntax OK"

      - name: Test launcher syntax
        run: |
          bash -n "$HOME/vplink3.0/vplink3.0.sh"
          echo "Shell syntax OK"

      - name: Test Termux code path (dry-run)
        run: |
          echo "=== Test require('playwright-core') exists ==="
          cd "$HOME/vplink3.0"
          ls node_modules/playwright-core/package.json > /dev/null && echo "playwright-core OK"

          echo "=== Test automation JS with VPLINK_TERMUX=1 (dry-run) ==="
          # Just parse to verify the Termux branch in JS doesn't have syntax errors
          node -e "
            const fs = require('fs');
            const code = fs.readFileSync('$HOME/vplink3.0/automation.js', 'utf8');
            // Check both launch paths exist
            if (code.includes('TERMUX') && code.includes('executablePath') && code.includes('no-sandbox')) {
              console.log('Termux branch present: OK');
            } else {
              console.error('Termux branch missing!');
              process.exit(1);
            }
          "

      - name: Test Termux launcher paths
        run: |
          echo "=== Test vplink3.0.sh detects Termux env ==="
          grep -q "TERMUX" "$HOME/vplink3.0/vplink3.0.sh" && echo "Termux detection in launcher: OK"
          grep -q "VPLINK_TERMUX" "$HOME/vplink3.0/vplink3.0.sh" && echo "VPLINK_TERMUX env var: OK"
          grep -q "chromium-browser" "$HOME/vplink3.0/automation.js" && echo "Chromium path in JS: OK"
