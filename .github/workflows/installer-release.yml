name: Installer Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run all tests
        run: |
          bash installer/tests/test_core.sh
          bash installer/tests/test_integration.sh
      - name: Lint
        run: |
          sudo apt-get install -y shellcheck
          shellcheck -S warning installer/installer.sh

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Make installer executable
        run: chmod +x installer/installer.sh
      - name: Generate SHA256 checksums
        run: |
          sha256sum installer/installer.sh > installer/installer.sh.sha256
          echo "Checksum:"
          cat installer/installer.sh.sha256

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Make installer executable
        run: chmod +x installer/installer.sh
      - name: Generate checksum
        run: sha256sum installer/installer.sh > installer/installer.sh.sha256
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "Installer $TAG" \
            --generate-notes \
            installer/installer.sh \
            installer/installer.sh.sha256
      - name: Verify release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release view "$TAG" --json tagName,assets

  smoke-test:
    name: Post-Release Smoke Test
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - name: Install via local script
        run: |
          chmod +x installer/installer.sh
          bash installer/installer.sh version
          bash installer/installer.sh doctor 2>&1 || true
      - name: Verify help output
        run: |
          output=$(bash installer/installer.sh help 2>&1)
          echo "$output"
          echo "$output" | grep -q "Usage:" || exit 1
          echo "$output" | grep -q "install" || exit 1
