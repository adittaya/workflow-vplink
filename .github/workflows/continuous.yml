name: 24/7 VPLink Automation Loop

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      key:
        description: 'vplink.in key or URL'
        required: false
        default: 'UbpV2D'
      views:
        description: 'Number of views to run'
        required: false
        default: '5'
  repository_dispatch:
    types: [relay]

concurrency:
  group: vplink-automation
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  SUPABASE_SECRET: ${{ secrets.SUPABASE_SECRET }}
  VPLINK_HEADLESS: '1'
  VPLINK_NONINTERACTIVE: '1'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser chromium-chromedriver xvfb >/dev/null 2>&1
          echo "Chromium: $(chromium-browser --version 2>/dev/null || true)"
          echo "ChromeDriver: $(chromedriver --version 2>/dev/null || true)"

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip --quiet
          pip install selenium webdriver-manager requests urllib3 --quiet

      - name: Configure Supabase
        run: |
          python3 config.py --set supabase_url "$SUPABASE_URL"
          python3 config.py --set supabase_key "$SUPABASE_KEY"
          python3 config.py --set supabase_secret "$SUPABASE_SECRET"
          python3 config.py --set proxy_enabled true
          python3 config.py --set proxy_tier premium

      - name: Get Proxy & Run Automation
        id: automate
        run: |
          KEY="${{ github.event.inputs.key || 'UbpV2D' }}"
          VIEWS="${{ github.event.inputs.views || '5' }}"
          echo "Running $VIEWS view(s) on KEY=$KEY"

          # Get a fresh proxy
          PROXY=$(python3 proxy_rotator.py premium | tail -1)
          echo "Proxy: $PROXY"
          export VPLINK_PROXY="http://$PROXY"

          # Run automation for each view
          SUCCESS=0
          FAIL=0
          for ((i=1; i<=VIEWS; i++)); do
            echo "--- View $i of $VIEWS ---"
            if python3 automation.py "$KEY" 2>&1; then
              SUCCESS=$((SUCCESS + 1))
            else
              FAIL=$((FAIL + 1))
            fi
            # Rotate proxy for next view
            PROXY=$(python3 proxy_rotator.py premium | tail -1)
            export VPLINK_PROXY="http://$PROXY"
            echo "Rotated proxy: $PROXY"
          done
          echo "Done: $SUCCESS success, $FAIL failed"

      - name: Relay Chain — Re-trigger via Repository Dispatch
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT }}
          event-type: relay
