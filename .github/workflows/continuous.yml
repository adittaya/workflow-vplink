name: VPLink Automation Loop

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      key:
        description: 'vplink.in key'
        required: false
        default: 'UbpV2D'
  repository_dispatch:
    types: [relay]

concurrency:
  group: vplink-${{ github.repository }}
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  SUPABASE_SECRET: ${{ secrets.SUPABASE_SECRET }}
  VPLINK_HEADLESS: '1'
  VPLINK_NONINTERACTIVE: '1'
  VPLINK_KEY: ${{ github.event.inputs.key || github.event.client_payload.key || 'UbpV2D' }}
  RELAY_TARGET_REPO: ${{ secrets.RELAY_TARGET_REPO || github.repository }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate key
        run: |
          if [ -z "$VPLINK_KEY" ]; then
            echo "::error::VPLINK_KEY is empty — cannot continue"
            exit 1
          fi
          echo "VPLINK_KEY=$VPLINK_KEY"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Google Chrome
        run: |
          sudo apt-get remove -y chromium-browser chromium-chromedriver >/dev/null 2>&1 || true
          wget -q -O /tmp/chrome.deb \
            https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y -qq /tmp/chrome.deb >/dev/null 2>&1
          sudo ln -sf /usr/bin/google-chrome /usr/bin/chromium-browser 2>/dev/null || true
          google-chrome --version

      - name: Install chromedriver + Python deps
        run: |
          pip install --break-system-packages -q selenium webdriver-manager requests urllib3 2>/dev/null \
            || pip install -q selenium webdriver-manager requests urllib3
          python3 -c "from webdriver_manager.chrome import ChromeDriverManager; print(ChromeDriverManager().install())"

      - name: Configure Supabase
        run: |
          python3 config.py --set supabase_url "$SUPABASE_URL"
          python3 config.py --set supabase_key "$SUPABASE_KEY"
          python3 config.py --set supabase_secret "$SUPABASE_SECRET"
          python3 config.py --set proxy_enabled true
          python3 config.py --set proxy_tier premium

      - name: Get proxy
        id: proxy
        run: |
          PROXY=$(python3 proxy_rotator.py premium | tail -1)
          echo "proxy=$PROXY" >> $GITHUB_OUTPUT
          echo "Got proxy: $PROXY"

      - name: Run automation (with proxy retry)
        id: automate
        timeout-minutes: 10
        env:
          CHROMIUM_PATH: /usr/bin/google-chrome
        run: |
          MAX_ATTEMPTS=3
          MIN_RUNTIME=120
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            PROXY="${{ steps.proxy.outputs.proxy }}"
            if [ -z "$PROXY" ]; then
              echo "No proxy available, running direct..."
              unset VPLINK_PROXY
            else
              export VPLINK_PROXY="http://$PROXY"
            fi

            echo "=== Attempt $attempt/$MAX_ATTEMPTS (proxy: $PROXY) ==="
            START=$(date +%s)
            timeout 580 python3 automation.py "$VPLINK_KEY" 2>&1 || true
            END=$(date +%s)
            ELAPSED=$((END - START))

            echo "Attempt $attempt finished in ${ELAPSED}s"
            if [ "$ELAPSED" -ge "$MIN_RUNTIME" ]; then
              echo "Ran for ${ELAPSED}s (>= ${MIN_RUNTIME}s) — proxy worked"
              break
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Ran only ${ELAPSED}s (< ${MIN_RUNTIME}s) — proxy likely blocked, rotating..."
              blacklisted="$PROXY"
              PROXY=$(python3 proxy_rotator.py premium | tail -1)
              echo "New proxy: $PROXY (blacklisted: $blacklisted)"
              echo "proxy=$PROXY" >> $GITHUB_OUTPUT
            fi
          done
          echo "status=success" >> $GITHUB_OUTPUT

          # Capture destination URL from automation output
          DEST_URL=""
          if [ -f destination_url.txt ]; then
            DEST_URL=$(cat destination_url.txt | tr -d '[:space:]')
          fi
          if [ -n "$DEST_URL" ]; then
            echo "destination=$DEST_URL" >> $GITHUB_OUTPUT
            echo "Destination: $DEST_URL"
          else
            echo "destination=" >> $GITHUB_OUTPUT
            echo "No destination captured"
          fi

      - name: Relay — trigger next run
        if: success() || failure()
        env:
          TRIGGER_TOKEN: ${{ secrets.LOOP_TRIGGER_TOKEN }}
        run: |
          if [ -z "$RELAY_TARGET_REPO" ]; then
            echo "::warning::RELAY_TARGET_REPO not set and github.repository empty — relay cannot fire"
            exit 0
          fi

          PAYLOAD='{"event_type":"relay","client_payload":{"key":"'"$VPLINK_KEY"'"}}'

          # Try LOOP_TRIGGER_TOKEN first, then fall back to GITHUB_TOKEN
          for TOKEN_VAR in TRIGGER_TOKEN GITHUB_TOKEN; do
            TOKEN="${!TOKEN_VAR}"
            if [ -z "$TOKEN" ]; then
              echo "$TOKEN_VAR is empty — skipping"
              continue
            fi
            echo "Trying relay with $TOKEN_VAR..."
            for attempt in 1 2 3; do
              HTTP_CODE=$(curl -s -o /tmp/relay_resp.txt -w "%{http_code}" -X POST \
                -H "Authorization: token $TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${RELAY_TARGET_REPO}/dispatches" \
                -d "$PAYLOAD")
              echo "  Attempt $attempt: HTTP $HTTP_CODE"
              if [ "$HTTP_CODE" = "204" ]; then
                echo "Relay dispatched successfully via $TOKEN_VAR"
                exit 0
              fi
              if [ "$HTTP_CODE" = "403" ] || [ "$HTTP_CODE" = "404" ]; then
                BODY=$(cat /tmp/relay_resp.txt 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('message',''))" 2>/dev/null || echo "")
                echo "  $TOKEN_VAR rejected: $BODY"
                break
              fi
              sleep 3
            done
          done
          echo "::warning::Relay failed — both LOOP_TRIGGER_TOKEN and GITHUB_TOKEN failed. Check token scopes (need 'repo' scope for repository_dispatch)"
          exit 1

      - name: Summary
        if: always()
        run: |
          DEST="${{ steps.automate.outputs.destination }}"
          if [ -n "$DEST" ]; then
            echo "## VPLink Result" >> $GITHUB_STEP_SUMMARY
            echo "Destination: $DEST" >> $GITHUB_STEP_SUMMARY
          else
            echo "## VPLink Result" >> $GITHUB_STEP_SUMMARY
            echo "No destination captured" >> $GITHUB_STEP_SUMMARY
          fi
