name: 24/7 VPLink Automation Loop

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      key:
        description: 'vplink.in key'
        required: false
        default: 'UbpV2D'
  repository_dispatch:
    types: [relay]

concurrency:
  group: vplink-automation
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  SUPABASE_SECRET: ${{ secrets.SUPABASE_SECRET }}
  VPLINK_HEADLESS: '1'
  VPLINK_NONINTERACTIVE: '1'
  VPLINK_KEY: ${{ github.event.inputs.key || github.event.client_payload.key || 'UbpV2D' }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Chrome + chromedriver
        run: |
          # On ubuntu-24.04, chromium-browser is a snap wrapper shell script
          # _check_native_binary() rejects it. Use webdriver-manager as fallback.
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            chromium-browser chromium-chromedriver >/dev/null 2>&1 || true
          pip install webdriver-manager --quiet
          echo "--- Versions ---"
          chromium-browser --version 2>/dev/null || echo "no chromium-browser"
          chromedriver --version 2>/dev/null | head -1 || echo "no chromedriver in PATH"

      - name: Install Python deps
        run: |
          pip install selenium requests urllib3 --quiet

      - name: Configure Supabase
        run: |
          python3 config.py --set supabase_url "$SUPABASE_URL"
          python3 config.py --set supabase_key "$SUPABASE_KEY"
          python3 config.py --set supabase_secret "$SUPABASE_SECRET"
          python3 config.py --set proxy_enabled true
          python3 config.py --set proxy_tier premium

      - name: Get proxy
        id: proxy
        run: |
          PROXY=$(python3 proxy_rotator.py premium | tail -1)
          echo "proxy=$PROXY" >> $GITHUB_OUTPUT
          echo "Got proxy: $PROXY"

      - name: Run automation
        id: automate
        env:
          VPLINK_PROXY: http://${{ steps.proxy.outputs.proxy }}
        run: |
          python3 automation.py "$VPLINK_KEY" 2>&1
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Invalidate proxy on failure
        if: failure()
        env:
          FAILED_PROXY: ${{ steps.proxy.outputs.proxy }}
        run: |
          HOST=$(echo "$FAILED_PROXY" | cut -d: -f1)
          PORT=$(echo "$FAILED_PROXY" | cut -d: -f2)
          python3 -c "import sys; sys.path.insert(0,'.'); from config import add_proxy_blacklist; add_proxy_blacklist('$HOST',$PORT)" 2>/dev/null || true
          echo "Blacklisted $HOST:$PORT"

      - name: Relay — trigger next run
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT }}
          event-type: relay
          client-payload: '{"key": "${{ env.VPLINK_KEY }}"}'
