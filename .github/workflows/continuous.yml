name: VPLink Automation Loop

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      key:
        description: 'vplink.in key'
        required: false
        default: 'UbpV2D'
  repository_dispatch:
    types: [relay]

concurrency:
  group: vplink-global
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  SUPABASE_SECRET: ${{ secrets.SUPABASE_SECRET }}
  VPLINK_HEADLESS: '1'
  VPLINK_NONINTERACTIVE: '1'
  VPLINK_KEY: ${{ github.event.inputs.key || github.event.client_payload.key || 'UbpV2D' }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Google Chrome
        run: |
          sudo apt-get remove -y chromium-browser chromium-chromedriver >/dev/null 2>&1 || true
          wget -q -O /tmp/chrome.deb \
            https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y -qq /tmp/chrome.deb >/dev/null 2>&1
          sudo ln -sf /usr/bin/google-chrome /usr/bin/chromium-browser 2>/dev/null || true
          google-chrome --version

      - name: Install chromedriver + Python deps
        run: |
          pip install selenium webdriver-manager requests urllib3 --quiet
          python3 -c "from webdriver_manager.chrome import ChromeDriverManager; print(ChromeDriverManager().install())"

      - name: Configure Supabase
        run: |
          python3 config.py --set supabase_url "$SUPABASE_URL"
          python3 config.py --set supabase_key "$SUPABASE_KEY"
          python3 config.py --set supabase_secret "$SUPABASE_SECRET"
          python3 config.py --set proxy_enabled true
          python3 config.py --set proxy_tier premium

      - name: Get proxy
        id: proxy
        run: |
          PROXY=$(python3 proxy_rotator.py premium | tail -1)
          echo "proxy=$PROXY" >> $GITHUB_OUTPUT
          echo "Got proxy: $PROXY"

      - name: Run automation (with proxy retry)
        id: automate
        timeout-minutes: 15
        env:
          CHROMIUM_PATH: /usr/bin/google-chrome
        run: |
          MAX_ATTEMPTS=3
          MIN_RUNTIME=120
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            PROXY="${{ steps.proxy.outputs.proxy }}"
            if [ -z "$PROXY" ]; then
              echo "No proxy available, running direct..."
              unset VPLINK_PROXY
            else
              export VPLINK_PROXY="http://$PROXY"
            fi

            echo "=== Attempt $attempt/$MAX_ATTEMPTS (proxy: $PROXY) ==="
            START=$(date +%s)
            timeout 580 python3 automation.py "$VPLINK_KEY" 2>&1 || true
            END=$(date +%s)
            ELAPSED=$((END - START))

            echo "Attempt $attempt finished in ${ELAPSED}s"
            if [ "$ELAPSED" -ge "$MIN_RUNTIME" ]; then
              echo "Ran for ${ELAPSED}s (>= ${MIN_RUNTIME}s) — proxy worked"
              break
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Ran only ${ELAPSED}s (< ${MIN_RUNTIME}s) — proxy likely blocked, rotating..."
              blacklisted="$PROXY"
              PROXY=$(python3 proxy_rotator.py premium | tail -1)
              echo "New proxy: $PROXY (blacklisted: $blacklisted)"
              echo "proxy=$PROXY" >> $GITHUB_OUTPUT
            fi
          done
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Relay — trigger next run
        if: always() && !cancelled()
        env:
          TRIGGER_TOKEN: ${{ secrets.LOOP_TRIGGER_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            echo "Relay attempt $attempt..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $TRIGGER_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/dispatches" \
              -d '{"event_type":"relay","client_payload":{"key":"'"$VPLINK_KEY"'"}}')
            echo "HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "204" ]; then
              echo "Relay dispatched successfully"
              break
            fi
            sleep 5
          done

      - name: Backup relay — schedule 10min fallback
        if: always() && !cancelled()
        env:
          TRIGGER_TOKEN: ${{ secrets.LOOP_TRIGGER_TOKEN }}
        run: |
          echo "Waiting 10 minutes before backup relay..."
          sleep 600
          echo "Firing backup relay..."
          for attempt in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $TRIGGER_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/dispatches" \
              -d '{"event_type":"relay","client_payload":{"key":"'"$VPLINK_KEY"'"}}')
            echo "Backup relay HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "204" ]; then
              echo "Backup relay dispatched"
              break
            fi
            sleep 5
          done
