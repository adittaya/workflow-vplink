name: CI/CD

on:
  push:
    branches: [main, 'v*']
    paths-ignore: ['**.md', '.gitignore']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'  # Weekly Sunday test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 1
  VPLINK_NONINTERACTIVE: 1

jobs:
  # ═══════════════════════════════════════════════════════════
  #  LINT
  # ═══════════════════════════════════════════════════════════

  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y -qq shellcheck
      - name: Run ShellCheck
        run: shellcheck -x -s bash --severity=warning install.sh vplink3.0.sh vplink-desktop.sh

  # ═══════════════════════════════════════════════════════════
  #  INSTALL — Full matrix
  # ═══════════════════════════════════════════════════════════

  install:
    name: Install ${{ matrix.label }}
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: ubuntu:24.04
            label: Ubuntu 24.04
            deps: apt-get update -qq && apt-get install -y -qq curl git ca-certificates
          - container: ubuntu:22.04
            label: Ubuntu 22.04
            deps: apt-get update -qq && apt-get install -y -qq curl git ca-certificates
          - container: debian:12
            label: Debian 12
            deps: apt-get update -qq && apt-get install -y -qq curl git ca-certificates
          - container: debian:11
            label: Debian 11
            deps: apt-get update -qq && apt-get install -y -qq curl git ca-certificates
          - container: fedora:40
            label: Fedora 40
            deps: dnf install -y curl git ca-certificates
          - container: alpine:3.20
            label: Alpine 3.20
            deps: apk add curl git ca-certificates bash
          - container: archlinux:latest
            label: Arch Linux
            deps: pacman -Sy --noconfirm curl git ca-certificates
          - container: opensuse/leap:15.6
            label: openSUSE Leap 15.6
            deps: zypper install -y curl git ca-certificates
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container }}
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Install base dependencies
        run: ${{ matrix.deps }}
      - name: Run installer
        run: bash install.sh 2>&1 | tail -20
      - name: Verify global command
        run: |
          if command -v vplink3.0; then
            echo "✓ Command found at $(which vplink3.0)"
          else
            echo "✗ vplink3.0 NOT in PATH"
            echo "PATH=$PATH"
            exit 1
          fi
      - name: Verify install state
        run: |
          [ -f /root/.vplink3.0/install_state.json ] && echo "✓ State file exists"
          [ -f /root/.vplink3.0/config.json ] && echo "✓ Config file exists"
      - name: Idempotency test (re-run installer)
        run: |
          bash install.sh 2>&1
          echo "✓ Idempotent install passed"

  # ═══════════════════════════════════════════════════════════
  #  UNINSTALL + REINSTALL (subset of distros)
  # ═══════════════════════════════════════════════════════════

  uninstall:
    name: Uninstall ${{ matrix.label }}
    needs: [install]
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: ubuntu:24.04
            label: Ubuntu 24.04
            deps: apt-get update -qq && apt-get install -y -qq curl git ca-certificates
          - container: debian:12
            label: Debian 12
            deps: apt-get update -qq && apt-get install -y -qq curl git ca-certificates
          - container: fedora:40
            label: Fedora 40
            deps: dnf install -y curl git ca-certificates
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container }}
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Install base dependencies
        run: ${{ matrix.deps }}
      - name: Install
        run: bash install.sh
      - name: Uninstall
        run: bash install.sh uninstall --all
      - name: Verify removal
        run: |
          if command -v vplink3.0 &>/dev/null; then
            echo "✗ vplink3.0 still found at $(which vplink3.0)"
            exit 1
          fi
          echo "✓ vplink3.0 removed from PATH"
          [ -d /root/vplink3.0 ] && echo "✗ Project dir still exists" && exit 1 || echo "✓ Project dir removed"
          [ -d /root/.vplink3.0 ] && echo "✓ Config dir kept (expected)" || echo "✓ No config dir"
      - name: Reinstall clean
        run: bash install.sh
        env:
          VPLINK_NONINTERACTIVE: 1

  # ═══════════════════════════════════════════════════════════
  #  DOCKER BUILD
  # ═══════════════════════════════════════════════════════════

  docker:
    name: Docker Build
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test in Docker
        run: |
          cat > /tmp/Dockerfile.test <<'DEOF'
          FROM ubuntu:24.04
          ENV CI=1 VPLINK_NONINTERACTIVE=1
          RUN apt-get update -qq && apt-get install -y -qq curl git ca-certificates
          COPY . /opt/vplink3.0-src

          # Fresh install
          RUN bash /opt/vplink3.0-src/install.sh
          RUN command -v vplink3.0 || (echo "✗ install failed" && exit 1)

          # Uninstall
          RUN bash /opt/vplink3.0-src/install.sh uninstall --all
          RUN command -v vplink3.0 && exit 1 || echo "✓ uninstalled"
          RUN [ ! -d /root/vplink3.0 ] && echo "✓ project dir removed"

          # Reinstall
          RUN bash /opt/vplink3.0-src/install.sh
          RUN command -v vplink3.0 || (echo "✗ reinstall failed" && exit 1)
          DEOF
          docker build -t vplink-test -f /tmp/Dockerfile.test .
          echo "✓ Docker test passed"

  # ═══════════════════════════════════════════════════════════
  #  SELF-UPDATE
  # ═══════════════════════════════════════════════════════════

  update:
    name: Self-Update
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install from current
        run: bash install.sh

      - name: Test update command
        run: |
          echo "Clone into separate dir to simulate remote update..."
          cd /tmp
          git clone --depth=1 https://github.com/adittaya/VPLINK-3.0.git test-update 2>/dev/null || true
          # Run update against the real install
          vplink3.0 update || true
          echo "✓ update ran without error"

  # ═══════════════════════════════════════════════════════════
  #  ENVIRONMENT DETECTION TESTS
  # ═══════════════════════════════════════════════════════════

  detection:
    name: Detection ${{ matrix.label }}
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: WSL
            env: WSL_DISTRO_NAME=Ubuntu
          - label: Termux
            env: PREFIX=/data/data/com.termux/files/usr
            setup: mkdir -p /data/data/com.termux
          - label: CI
            env: CI=1
          - label: Docker
            env: DOCKER_CONTAINER=1
            setup: touch /.dockerenv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run detection test
        run: |
          ${{ matrix.setup }}
          export ${{ matrix.env }}
          bash -c '
            source <(grep -v "^#!/" install.sh)
            detect_os
            detect_distro
            echo "OS=$(detect_os) Distro=$DISTRO Arch=$(detect_arch) libc=$(detect_libc)"
            is_root && echo "✓ root" || echo "✓ non-root"
            echo "✓ ${{ matrix.label }} detection passed"
          '
        shell: bash

  # ═══════════════════════════════════════════════════════════
  #  RESULTS SUMMARY
  # ═══════════════════════════════════════════════════════════

  summary:
    name: CI Results
    needs: [lint, install, uninstall, docker, update, detection]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print build summary
        run: |
          echo "══════════════════════════════════════════════"
          echo "  VPLink 3.0 CI Results"
          echo "══════════════════════════════════════════════"
          echo "  lint:       ${{ needs.lint.result }}"
          echo "  install:    ${{ needs.install.result }}"
          echo "  uninstall:  ${{ needs.uninstall.result }}"
          echo "  docker:     ${{ needs.docker.result }}"
          echo "  update:     ${{ needs.update.result }}"
          echo "  detection:  ${{ needs.detection.result }}"
          echo "══════════════════════════════════════════════"
