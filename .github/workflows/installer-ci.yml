name: Installer CI

on:
  push:
    branches: [main]
    paths:
      - 'installer/**'
      - '.github/workflows/installer-ci.yml'
  pull_request:
    paths:
      - 'installer/**'

jobs:
  lint:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint all shell scripts
        run: |
          errors=0
          for f in $(find installer/ -name "*.sh"); do
            echo "Checking $f..."
            if ! shellcheck -S warning "$f"; then
              errors=$((errors + 1))
            fi
          done
          echo "Files with issues: $errors"
          exit $errors

  test-linux:
    name: Tests (Ubuntu)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: bash installer/tests/test_core.sh
      - name: Run integration tests
        run: bash installer/tests/test_integration.sh

  test-macos:
    name: Tests (macOS)
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: bash installer/tests/test_core.sh
      - name: Run integration tests
        run: bash installer/tests/test_integration.sh

  test-termux:
    name: Tests (Termux simulation)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Simulate Termux environment
        run: |
          export PREFIX=/data/data/com.termux/files/usr
          mkdir -p /data/data/com.termux 2>/dev/null || true
          bash installer/tests/test_core.sh

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [test-linux, test-macos]
    steps:
      - uses: actions/checkout@v4
      - name: Verify installer.sh is executable
        run: |
          test -x installer/installer.sh || chmod +x installer/installer.sh
          bash installer/installer.sh version
          bash installer/installer.sh help
      - name: Verify all modules can be sourced
        run: |
          cd installer
          for f in core/*.sh platforms/linux.sh interactive/ui.sh commands/*.sh verification/*.sh packages/definitions.sh; do
            echo "Sourcing $f..."
            bash -c "source $f" 2>/dev/null || echo "WARN: $f source returned non-zero"
          done
