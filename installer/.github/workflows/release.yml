name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm install

      - name: Build Linux binary
        run: bun build src/cli.tsx --compile --outfile dist/installer-linux-x64

      - name: Build macOS binary
        run: |
          bun build src/cli.tsx --compile --target=bun-darwin-arm64 --outfile dist/installer-macos-arm64
          bun build src/cli.tsx --compile --target=bun-darwin-x64 --outfile dist/installer-macos-x64

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/installer-linux-x64
            dist/installer-macos-arm64
            dist/installer-macos-x64
          generate_release_notes: true
