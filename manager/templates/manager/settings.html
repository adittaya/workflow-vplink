{% extends "manager/base.html" %}
{% block content %}
<h4 class="mb-4"><i class="bi bi-gear"></i> Settings</h4>

<div class="row">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">Change Password</div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" name="current_password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" class="form-control" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Update Password</button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card">
      <div class="card-header">System Info</div>
      <div class="card-body">
        <table class="table table-sm">
          <tr><td>Version</td><td>3.0</td></tr>
          <tr><td>Database</td><td><code>manager.db</code></td></tr>
          <tr><td>Template Dir</td><td><code>manager/templates/</code></td></tr>
          <tr><td>Auth</td><td>PBKDF2-HMAC-SHA256</td></tr>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
